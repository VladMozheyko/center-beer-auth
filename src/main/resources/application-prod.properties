]# ==================================================
# VK OAUTH2 (OAuth2 Login + PKCE)
# ==================================================
spring.security.oauth2.client.registration.vk.client-id=${VK_CLIENT_ID}
spring.security.oauth2.client.registration.vk.client-secret=${VK_CLIENT_SECRET}
spring.security.oauth2.client.registration.vk.client-name=VK
spring.security.oauth2.client.registration.vk.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.vk.client-authentication-method=post
spring.security.oauth2.client.registration.vk.redirect-uri=${app.server.base-url}/login/oauth2/code/vk
spring.security.oauth2.client.registration.vk.scope=openid,profile,email

spring.security.oauth2.client.provider.vk.authorization-uri=https://oauth.vk.com/authorize
spring.security.oauth2.client.provider.vk.token-uri=https://oauth.vk.com/access_token
spring.security.oauth2.client.provider.vk.user-info-uri=https://api.vk.com/method/users.get?fields=photo_200,email&access_token={token}&v=5.131
spring.security.oauth2.client.provider.vk.user-name-attribute=response
spring.security.oauth2.client.provider.vk.jwk-set-uri=https://id.vk.com/.well-known/jwks.json
# ==================================================
# YANDEX OAUTH2
# ==================================================
spring.security.oauth2.client.registration.yandex.client-id=${YANDEX_CLIENT_ID}
spring.security.oauth2.client.registration.yandex.client-secret=${YANDEX_CLIENT_SECRET}
#spring.security.oauth2.client.registration.yandex.client-id=95b3d98ecb4f4a6ea522926fbd2f219d
#spring.security.oauth2.client.registration.yandex.client-secret=c36d5ed9acce4928af5d1e3f3eb2827b

spring.security.oauth2.client.registration.yandex.scope=login:email,login:info
spring.security.oauth2.client.registration.yandex.redirect-uri=https://center.beer/auth_service/login/oauth2/code/yandex
spring.security.oauth2.client.registration.yandex.client-name=Yandex

spring.security.oauth2.client.registration.yandex.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.yandex.client-authentication-method=client_secret_post
spring.security.oauth2.client.provider.yandex.authorization-uri=https://oauth.yandex.ru/authorize
spring.security.oauth2.client.provider.yandex.token-uri=https://oauth.yandex.ru/token
spring.security.oauth2.client.provider.yandex.user-info-uri=https://login.yandex.ru/info
spring.security.oauth2.client.provider.yandex.user-name-attribute=id
# ==================================================
# GOOGLE OAUTH2
# ==================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${app.server.base-url}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.client-name=Google
# ==================================================
# ------------------CRON------------------
# ==================================================
backup.cron=0 0 * * * *
# ==================================================
# SMS SERVICE (SMSC.RU)
