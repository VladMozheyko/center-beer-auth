# ==================================================
# DATABASE (MySQL)
# ==================================================
spring.datasource.url=jdbc:mysql://center_beer_db:3306/center_beer?serverTimezone=Europe/Moscow&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048&useServerPrepStmts=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DATABASE_MYSQL_USERNAME}
spring.datasource.password=${DATABASE_MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=100
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=60000
spring.datasource.hikari.validation-timeout=5000
# ==================================================
# ---------- SERVER ----------
# ==================================================
server.address=0.0.0.0
server.port=8080
server.ssl.enabled=false
server.forward-headers-strategy=framework
server.use-forward-headers=true
server.tomcat.remoteip.internal-proxies=.*
# ==================================================
# JPA / HIBERNATE
# ==================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# ==================================================
# JWT CONFIGURATION
# ==================================================
application.security.jwt.secret-key=${SECURITY_JWT_SECRET_KEY}
application.security.jwt.expiration=900000
application.security.jwt.cookie-name=jwt-cookie
application.security.jwt.refresh-token.expiration=1296000000
application.security.jwt.refresh-token.cookie-name=refresh-jwt-cookie
# ==================================================
# MAIL (Gmail SMTP)
# ==================================================
spring.mail.host=smtp.yandex.ru
spring.mail.username=${GMAIL_SERVICE_USERNAME}
spring.mail.password=${GMAIL_SERVICE_PASSWORD}
spring.mail.port=465
spring.mail.protocol=smtps
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.auth=true
mail.debug=false
# ==================================================
# ---------- TOMCAT ----------
# ==================================================
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=20
server.tomcat.accept-count=100
server.tomcat.max-connections=1000
server.tomcat.keep-alive-timeout=30000
server.tomcat.connection-timeout=30000
server.tomcat.uri-encoding=UTF-8
server.compression.enabled=true
# ==================================================
# ---------- MULTIPART ----------
# ==================================================
spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=5MB
# ==================================================
# -------------LOGGING----------
# ==================================================
logging.level.root=INFO
logging.level.org.springframework=DEBUG
logging.level.fr.mossaab.security=DEBUG
logging.level.org.springframework.web.client.RestTemplate=TRACE
logging.level.org.springframework.http.client=DEBUG
# ==================================================
# ---------- SPRINGDOC / SWAGGER ----------
# ==================================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.url=/auth_service/v3/api-docs
springdoc.swagger-ui.config-url=/auth_service/v3/api-docs/swagger-config
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.use-root-path=true
