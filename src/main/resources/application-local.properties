# ==================================================
# SERVER CONFIGURATION
# ==================================================
server.port=80
server.ssl.enabled=false
# ==================================================
# DATABASE (MySQL)
# ==================================================
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/bm?serverTimezone=Europe/Moscow
spring.datasource.username=${LOCAL_DATABASE_MYSQL_USERNAME}
spring.datasource.password=${LOCAL_DATABASE_MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=60000
spring.datasource.hikari.validation-timeout=5000
# ==================================================
# JPA / HIBERNATE
# ==================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# ==================================================
# JWT CONFIGURATION
# ==================================================
application.security.jwt.secret-key=${SECURITY_JWT_SECRET_KEY}
application.security.jwt.expiration=900000
application.security.jwt.cookie-name=jwt-cookie

application.security.jwt.refresh-token.expiration=1296000000
application.security.jwt.refresh-token.cookie-name=refresh-jwt-cookie
# ==================================================
# MAIL (Gmail SMTP)
# ==================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${LOCAL_GMAIL_SERVICE_USERNAME}
spring.mail.password=${LOCAL_GMAIL_SERVICE_PASSWORD}
spring.mail.protocol=smtps

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
mail.debug=false
# ==================================================
# FILE UPLOAD
# ==================================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
# ==================================================
# TEMPLATES (Thymeleaf)
# ==================================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
# ==================================================
# FRONTEND & BACKEND ADDRESSES
# ==================================================
## BACKEND BASE-ADDRESSES
app.server.base-url=http://localhost:80
## FRONTEND BASE-ADDRESSES
frontend.server.address=http://localhost:8081
app.server.public-url=https://center.beer/auth_service
# ==================================================
# PATHS
# ==================================================
app.upload-path=${LOCAL_APP_UPLOAD_PATH}
app.backup-path=${LOCAL_APP_BACKUP_PATH}
# ==================================================
# SMS SERVICE (SMSC.RU)
# ==================================================
sms.smsc.login=ShiSha_34
sms.smsc.password=${SMS_SERVICE_PASSWORD}
sms.call.api-id=${SMS_SERVICE_API_ID}
# ==================================================
# GOOGLE OAUTH2
# ==================================================
spring.security.oauth2.client.registration.google.client-id=${LOCAL_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${LOCAL_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.client-name=Google
# ==================================================
# YANDEX OAUTH2
# ==================================================
spring.security.oauth2.client.registration.yandex.client-id=${LOCAL_YANDEX_CLIENT_ID}
spring.security.oauth2.client.registration.yandex.client-secret=${LOCAL_YANDEX_CLIENT_SECRET}
spring.security.oauth2.client.registration.yandex.scope=login:email,login:info
spring.security.oauth2.client.registration.yandex.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.yandex.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.yandex.client-name=Yandex
spring.security.oauth2.client.provider.yandex.authorization-uri=https://oauth.yandex.ru/authorize
spring.security.oauth2.client.provider.yandex.token-uri=https://oauth.yandex.ru/token
spring.security.oauth2.client.provider.yandex.user-info-uri=https://login.yandex.ru/info
spring.security.oauth2.client.provider.yandex.user-name-attribute=id
# ==================================================
# VK OAUTH2 (OAuth2 Login + PKCE)
# ==================================================
spring.security.oauth2.client.registration.vk.client-id=${LOCAL_VK_CLIENT_ID}
spring.security.oauth2.client.registration.vk.client-secret=${LOCAL_VK_CLIENT_SECRET}
spring.security.oauth2.client.registration.vk.client-name=VK
spring.security.oauth2.client.registration.vk.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.vk.client-authentication-method=post
spring.security.oauth2.client.registration.vk.scope=openid,profile,email
spring.security.oauth2.client.registration.vk.redirect-uri=http://localhost/oauth2/code/vk
spring.security.oauth2.client.provider.vk.authorization-uri=https://oauth.vk.com/authorize
spring.security.oauth2.client.provider.vk.token-uri=https://oauth.vk.com/access_token
spring.security.oauth2.client.provider.vk.user-info-uri=https://api.vk.com/method/users.get?fields=uid,first_name,last_name,email&access_token={accessToken}&v=5.131
spring.security.oauth2.client.provider.vk.user-name-attribute=response
spring.security.oauth2.client.provider.vk.jwk-set-uri=https://id.vk.com/.well-known/jwks.json
# ==================================================
# LOGGING
# ==================================================

logging.level.fr.mossaab.security=DEBUG