# ---------- SERVER (minimum for tests) ----------
server.port=0
server.ssl.enabled=false

# ---------- DB SWITCH ----------
#   real (default) - use MySQL from application.properties
#   h2             - Use H2 in-memory (for tests)
test.db.type=h2

# ---------- H2 ----------
test.h2.datasource.url=jdbc:h2:mem:bm_test;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
test.h2.datasource.username=sa
test.h2.datasource.password=
test.h2.datasource.driver-class-name=org.h2.Driver

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/test_current?serverTimezone=Europe/Moscow
